<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 80" fill="none">
  <defs>
    <linearGradient id="fitGrad" x1="0" y1="0" x2="72" y2="48" gradientUnits="userSpaceOnUse">
      <stop stop-color="#059669"/>
      <stop offset="0.45" stop-color="#10B981"/>
      <stop offset="1" stop-color="#22D3EE"/>
    </linearGradient>
    <linearGradient id="novaGrad" x1="72" y1="0" x2="280" y2="48" gradientUnits="userSpaceOnUse">
      <stop stop-color="#38BDF8"/>
      <stop offset="0.4" stop-color="#2563EB"/>
      <stop offset="0.75" stop-color="#06B6D4"/>
      <stop offset="1" stop-color="#8B5CF6"/>
    </linearGradient>
    <linearGradient id="aiGrad" x1="280" y1="0" x2="380" y2="48" gradientUnits="userSpaceOnUse">
      <stop stop-color="#7C3AED"/>
      <stop offset="0.5" stop-color="#C084FC"/>
      <stop offset="1" stop-color="#F472B6"/>
    </linearGradient>
    <filter id="textGlow">
      <feDropShadow dx="0" dy="1" stdDeviation="2.5" flood-color="#06B6D4" flood-opacity="0.35"/>
    </filter>
  </defs>
  <g filter="url(#textGlow)">
    <text x="0" y="44" font-family="system-ui, -apple-system, Segoe UI, sans-serif" font-size="46" font-weight="800" font-style="italic" letter-spacing="-1">
      <tspan fill="url(#fitGrad)">Fit</tspan><tspan fill="url(#novaGrad)">Nova</tspan><tspan fill="url(#aiGrad)"> AI</tspan>
    </text>
    <text x="2" y="68" fill="#0F766E" font-family="system-ui, sans-serif" font-size="11" font-weight="600" letter-spacing="0.14em" opacity="0.9">
      INTELLIGENT FITNESS &amp; NUTRITION
    </text>
  </g>
</svg>
